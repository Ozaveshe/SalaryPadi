project_id = "salarypadi"

[api]
enabled = true
port = 54321
schemas = ["api"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[local_smtp]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = false
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "https://salarypadi.com"
additional_redirect_urls = [
  "https://salarypadi.com/auth/callback",
  "https://salarypadi.netlify.app/auth/callback",
  "https://**--salarypadi.netlify.app/**",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
