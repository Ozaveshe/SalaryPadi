name: AfroTools live smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: afrotools-live-smoke
  cancel-in-progress: true

jobs:
  production-tools:
    name: Production PAYE and FX journeys
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_BASE_URL: https://salarypadi.com
      NEXT_PUBLIC_APP_URL: https://salarypadi.com
      REQUIRE_LIVE_AFROTOOLS: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify protected production integrations
        run: >-
          npx playwright test tests/e2e/public-flows.spec.ts
          --project=desktop-chromium
          --grep "verifies PAYE live|completes offer comparison"
