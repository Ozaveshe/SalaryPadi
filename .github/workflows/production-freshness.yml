name: Production freshness

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3,9,15,21 * * *"

permissions:
  contents: read

concurrency:
  group: production-freshness
  cancel-in-progress: true

jobs:
  verify-production-freshness:
    name: Production health, workers, and routes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SALARYPADI_ORIGIN: https://salarypadi.com
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production freshness
        run: node scripts/verify-production-freshness.mjs
